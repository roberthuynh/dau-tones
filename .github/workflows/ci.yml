name: Release gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify product and receipts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Set up Python 3.11 and uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: api/uv.lock

      - name: Install locked production-boundary dependencies
        run: npm ci --no-audit --no-fund

      - name: Install locked web dependencies
        run: npm --prefix web ci --no-audit --no-fund

      - name: Install locked API dependencies
        run: uv sync --project api --python 3.11 --frozen

      - name: Guard secrets and active model IDs
        run: uv run --project api --frozen python -m scripts.release_guards

      - name: Audit production npm dependencies
        run: |
          npm audit --audit-level=high
          npm --prefix web audit --audit-level=high

      - name: Export and audit production Python dependencies
        run: |
          uv export --project api --frozen --no-dev --no-emit-project --format requirements-txt --output-file /tmp/dau-requirements.txt
          uvx --from pip-audit==2.10.1 pip-audit --strict --requirement /tmp/dau-requirements.txt

      - name: Validate committed course and media receipts
        run: |
          uv run --project api --frozen python -m scripts.validate_echo_course --json
          uv run --project api --frozen python -m scripts.validate_release --json

      - name: Ruff
        run: uv run --project api --frozen ruff check api

      - name: Strict product mypy
        run: uv run --project api --frozen mypy --strict api/dau/*.py api/index.py api/eval.py api/scripts/*.py

      - name: API tests and coverage floor
        run: uv run --project api --frozen pytest -q api/tests --cov=api/dau --cov-branch --cov-report=term-missing

      - name: Web lint
        run: npm --prefix web run lint

      - name: Production-boundary typecheck
        run: npm run typecheck

      - name: Web tests and coverage floors
        run: npm --prefix web run test:coverage

      - name: Production web build
        run: npm --prefix web run build

      - name: Regenerate committed browser data
        run: npm --prefix web run generate

      - name: Require generated artifacts to be clean
        run: git diff --exit-code

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Offline Playwright journey
        run: npm --prefix web run test:e2e
